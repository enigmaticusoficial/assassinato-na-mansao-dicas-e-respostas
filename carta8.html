<script>




// Este comando captura a altura e cria a variável no CSS
const ajustarAltura = () => {
 document.documentElement.style.setProperty('--altura-real', `${window.innerHeight}px`);
}

// Executa ao carregar a página
ajustarAltura();


//INICIAR MUSICA
const musica = document.getElementById('musica-tema');
const botao = document.getElementById('btn-audio');

let musicaIniciada = false;

// Inicia a música no primeiro toque/clique
function iniciarMusica() {
    if (!musicaIniciada) {
        musica.play();
        musicaIniciada = true;
    }
}

// Captura qualquer interação do usuário
document.addEventListener('pointerdown', iniciarMusica);

// Botão liga/desliga
botao.addEventListener('click', function () {
    if (musica.paused) {
        musica.play();
        botao.textContent = "🔊";
    } else {
        musica.pause();
        botao.textContent = "🔇";
    }
});



// --- LÓGICA DE BLOQUEIO DE OPÇÕES DUPLICADAS ---
const selects = document.querySelectorAll('.selecao-lugar');

selects.forEach(select => {
    select.addEventListener('change', () => {
        // Pega todos os valores que já foram selecionados em qualquer caixa
        const valoresOcupados = Array.from(selects)
            .map(s => s.value)
            .filter(val => val !== ""); 

        // Percorre cada select e cada opção dentro dele
        selects.forEach(s => {
            const opcoes = s.querySelectorAll('option');
            opcoes.forEach(opt => {
                // Se a opção está ocupada por OUTRA caixa, desabilita
                if (valoresOcupados.includes(opt.value) && s.value !== opt.value) {
                    opt.disabled = true;
                } else {
                    opt.disabled = false;
                }
            });
        });
    });
});


const selects2 = document.querySelectorAll('.selecao-hora');

selects2.forEach(select => {
    select.addEventListener('change', () => {
        // Pega todos os valores que já foram selecionados em qualquer caixa
        const valoresOcupados = Array.from(selects2)
            .map(s => s.value)
            .filter(val => val !== ""); 

        // Percorre cada select e cada opção dentro dele
        selects2.forEach(s => {
            const opcoes = s.querySelectorAll('option');
            opcoes.forEach(opt => {
                // Se a opção está ocupada por OUTRA caixa, desabilita
                if (valoresOcupados.includes(opt.value) && s.value !== opt.value) {
                    opt.disabled = true;
                } else {
                    opt.disabled = false;
                }
            });
        });
    });
});

// Função para verificar se o jogador acertou tudo
const respostaCorreta = {
  aparecido: { hora: "3", comodo: "5" },
  anelise:   { hora: "6", comodo: "3" },
  issabela:  { hora: "1", comodo: "1" },

  diogo:     { hora: "4", comodo: "4" },
  tolland:   { hora: "2", comodo: "2" }
};

document.getElementById('btn-verificar').addEventListener('click', function () {
    const respostasUsuario = {
        aparecido: {
            hora: document.getElementById('aparecidohora').value,
            comodo: document.getElementById('aparecidocomodo').value
        },
        anelise: {
            hora: document.getElementById('anelisehora').value,
            comodo: document.getElementById('anelisecomodo').value
        },
        issabela: {
            hora: document.getElementById('issabelahora').value,
            comodo: document.getElementById('issabelacomodo').value
        },
        pedro: {
            hora: document.getElementById('pedrohora').value,
            comodo: document.getElementById('pedrocomodo').value
        },
        diogo: {
            hora: document.getElementById('diogohora').value,
            comodo: document.getElementById('diogocomodo').value
        },
        tolland: {
            hora: document.getElementById('tollandhora').value,
            comodo: document.getElementById('tollandcomodo').value
        }
    };

    let tudoCerto = true;

    for (let pessoa in respostaCorreta) {
        if (
            respostasUsuario[pessoa].hora !== respostaCorreta[pessoa].hora ||
            respostasUsuario[pessoa].comodo !== respostaCorreta[pessoa].comodo
        ) {
            tudoCerto = false;
            break;
        }
    }

    if (tudoCerto) {
        alert("🎯 Perfeito! Você resolveu o enigma.");
        window.location.href = "carta9.html";
    } else {
        alert("❌ Ainda não está correto. Continue investigando!");
    }
});





function revelarDica(idBotao, idTexto) {
    const botao = document.getElementById(idBotao);
    const texto = document.getElementById(idTexto);

    if (botao && texto) {
        botao.style.display = 'none';   // Esconde o botão clicado
        texto.style.display = 'block';  // Mostra o texto correspondente
    }
}
